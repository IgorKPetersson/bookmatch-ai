<svg width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
    <linearGradient id="bookL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8360A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="bookR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
  </defs>

  <!-- === ICON === -->
  <g transform="translate(60, 20)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- Left book page (red-orange) -->
    <path d="M46,10 Q20,30 18,110 Q32,95 46,90 Z" fill="url(#bookL)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Right book page (orange-yellow) -->
    <path d="M46,10 Q72,30 74,110 Q60,95 46,90 Z" fill="url(#bookR)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Spine shadow -->
    <path d="M46,10 L46,90" stroke="#c0600a" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(192, 96, 10);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Play triangle (dark, centered) -->
    <polygon points="36,42 36,72 62,57" fill="#1a3a5c" opacity="0.9" style="fill:rgb(26, 58, 92);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Signal arcs (right side) -->
    <path d="M80,57 Q88,47 88,57 Q88,67 80,57" fill="none" stroke="#1877C8" stroke-width="3.5" stroke-linecap="round" style="fill:none;stroke:rgb(24, 119, 200);color:rgb(0, 0, 0);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M86,57 Q98,43 98,57 Q98,71 86,57" fill="none" stroke="#1877C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(24, 119, 200);color:rgb(0, 0, 0);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M94,57 Q110,38 110,57 Q110,76 94,57" fill="none" stroke="#1877C8" stroke-width="3.5" stroke-linecap="round" opacity="0.4" style="fill:none;stroke:rgb(24, 119, 200);color:rgb(0, 0, 0);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>

  <!-- === WORDMARK === -->
  <text y="122" x="196" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <tspan style="fill:rgb(26, 58, 92);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:64px;font-weight:700;text-anchor:start;dominant-baseline:auto">media</tspan><tspan style="fill:rgb(24, 119, 200);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:64px;font-weight:700;text-anchor:start;dominant-baseline:auto">match</tspan>
  </text>

</svg>